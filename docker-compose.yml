version: '3.8'

services:
  # ----------------------------
  # | BACKEND WEB (FLASK)      |
  # ----------------------------
  flask_api:
    build:
      context: "./routine4life_web"
      dockerfile: dockerfile
    container_name: api_r4life
    ports:
      - "5050:5000"
    env_file:
      - .env
    networks:
      - app_network
    volumes:
      - "./routine4life_web:/app"
      - "./shared:/app/shared"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ----------------------------
  # | API DE LA WEB (miAPI)    |
  # ----------------------------
  web_api:
    build:
      context: "./routine4life_web" 
      dockerfile: miAPI/dockerfile 
    container_name: miAPI_r4life
    ports:
      - "8080:8080" 
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app_network
    volumes:
      - "./routine4life_web:/app" 
      - "./shared:/app/shared"

  # ----------------------------
  # | BACKEND MÓVIL (FASTAPI)  |
  # ----------------------------
  mobile_api:
    build:
      context: . 
      dockerfile: routine4life_mobile/backend/Dockerfile
    container_name: routine4life_mobile_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway" 
    networks:
      - app_network
    restart: unless-stopped

networks:
  app_network:
    driver: bridge
