version: '3.8'

services:


  # ----------------------------
  # | BASE DE DATOS (SQL SERVER)|
  # ----------------------------
  sql_server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: db_r4life
    ports:
      - "14333:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Routine4Life_2026!
    networks:
      - app_network
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped

  # ----------------------------
  # | BACKEND WEB (FLASK)      |
  # ----------------------------
  flask_api:
    build:
      context: .
      dockerfile: routine4life_web/dockerfile
    container_name: api_r4life
    ports:
      - "5050:5000"
    env_file:
      - .env
    networks:
      - app_network
    volumes:
      - ./routine4life_web:/app
      - ./shared:/app/shared
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - PYTHONUNBUFFERED=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - sql_server

  # ----------------------------
  # | API DE LA WEB (miAPI)    |
  # ----------------------------
  web_api:
    build:
      context: "./routine4life_web" 
      dockerfile: miAPI/Dockerfile 
    container_name: miAPI_r4life
    ports:
      - "8080:8080" 
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app_network
    volumes:
      - "./routine4life_web:/app" 
      - "./shared:/app/shared"
    depends_on:
      - sql_server

  # ----------------------------
  # | BACKEND MÓVIL (FASTAPI)  |
  # ----------------------------
  mobile_api:
    build:
      context: . 
      dockerfile: routine4life_mobile/backend/Dockerfile
    container_name: routine4life_mobile_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway" 
    networks:
      - app_network
    restart: unless-stopped
    depends_on:
      - sql_server

networks:
  app_network:
    driver: bridge

volumes:
  sqlserver_data: