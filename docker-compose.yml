version: '3.8'

services:
  # ----------------------------
  # | BACKEND WEB (FLASK)      |
  # ----------------------------
  flask_api:
    build:
      context: "./routine4life_web" 
      dockerfile: dockerfile 
    container_name: api_r4life
    ports:
      - "5050:5000" 
    networks:
      - app_network
    volumes:
      - "./routine4life_web:/app" 

  # ----------------------------
  # | BACKEND MÓVIL (FASTAPI)  |
  # ----------------------------
  mobile_api:
    build:
      context: . 
      dockerfile: routine4life_mobile/backend/Dockerfile
    container_name: routine4life_mobile_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway" 
    networks:
      - app_network
    restart: unless-stopped

networks:
  app_network:
    driver: bridge