<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Recuperar contraseña</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='recuperar_contrasena.css') }}">
    <style>
        .alert {
            padding: 10px;
            margin: 10px auto;
            border-radius: 5px;
            width: 300px;
        }
        .alert-info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        .alert-danger {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
    </style>
</head>

<body>

    <center>

        <h2>Recuperar contraseña</h2>

        <p>Ingrese su correo para recuperar su contraseña</p>

        <!-- Mostrar mensajes flash -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('recuperar_contrasena') }}">
            <input type="email" name="email" placeholder="Correo electrónico" required>
            <br><br>
            <button type="submit">Enviar recuperación</button>
        </form>

        <br>

        <a href="{{ url_for('login') }}">Volver al login</a>

    </center>

</body>

</html>
