<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recuperar contraseña</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="recuperar-page">
    <center>
        <div class="recuperar-container">
            <h2>Recuperar contraseña</h2>
            <p>Ingrese su correo para recuperar su contraseña</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('recuperar_contrasena') }}">
                <input type="email" name="email" placeholder="Correo electrónico" required>
                <br><br>
                <button type="submit">Enviar recuperación</button>
            </form>

            <br>
            <a href="{{ url_for('login') }}">Volver al login</a>
        </div>
    </center>
</body>
</html>
