<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Medico - Routine4Life</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; }
        h1 { color: #2c3e50; margin-bottom: 20px; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .btn { display: inline-block; padding: 10px 20px; text-decoration: none; border-radius: 5px; margin-top: 20px; margin-right: 10px; border: none; cursor: pointer; }
        .btn-guardar { background: #27ae60; color: white; }
        .btn-cancelar { background: #e74c3c; color: white; }
        .flash { padding: 10px; margin-bottom: 20px; border-radius: 5px; }
        .flash-success { background: #d4edda; color: #155724; }
        .flash-danger { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Editar Medico</h1>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash flash-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <label>Nombre completo:</label>
            <input type="text" name="nombre_completo" value="{{ medico.datos_personales.nombre_completo if medico.datos_personales else '' }}" required>

            <label>Email:</label>
            <input type="email" name="email" value="{{ medico.email }}" required>

            <label>RFC:</label>
            <input type="text" name="rfc" value="{{ medico.rfc }}" required>

            <label>Cedula profesional:</label>
            <input type="text" name="cedula_profesional" value="{{ medico.cedula_profesional }}" required>

            <label>Codigo interno:</label>
            <input type="text" name="codigo" value="{{ medico.codigo }}" required>

            <label>Fecha de nacimiento:</label>
            <input type="date" name="fecha_nacimiento" value="{{ medico.datos_personales.fecha_nacimiento if medico.datos_personales else '' }}" required>

            <label>Telefono:</label>
            <input type="text" name="telefono" value="{{ medico.datos_personales.telefono if medico.datos_personales else '' }}" required>

            <label>Sexo:</label>
            <select name="id_sexo" required>
                <option value="">Seleccione...</option>
                {% for sexo in sexos %}
                <option value="{{ sexo.id_sexo }}" {% if medico.datos_personales and medico.datos_personales.id_sexo == sexo.id_sexo %}selected{% endif %}>
                    {{ sexo.nombre }}
                </option>
                {% endfor %}
            </select>

            <label>Especialidad:</label>
            <select name="id_especialidad" required>
                <option value="">Seleccione...</option>
                {% for esp in especialidades %}
                <option value="{{ esp.id_especialidad }}" {% if medico.id_especialidad == esp.id_especialidad %}selected{% endif %}>
                    {{ esp.nombre }}
                </option>
                {% endfor %}
            </select>

            <div>
                <button type="submit" class="btn btn-guardar">Guardar cambios</button>
                <a href="{{ url_for('gestionar_medicos') }}" class="btn btn-cancelar">Cancelar</a>
            </div>
        </form>
    </div>
</body>
</html>
