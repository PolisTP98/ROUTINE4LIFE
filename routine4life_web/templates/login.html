<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Login - Sistema Médico</title>
    <link rel="stylesheet" href="/static/login.css">
</head>

<body>

    <center>

        <h1>Sistema Médico</h1>

        <h2>Iniciar Sesión</h2>

        <form>

            <table>

                <tr>
                    <td>Usuario o correo:</td>
                    <td><input type="text" placeholder="Ingrese su usuario o correo"></td>
                </tr>

                <tr>
                    <td>Contraseña:</td>
                    <td><input type="password" placeholder="Ingrese su contraseña"></td>
                </tr>

            </table>

            <br>

            <button type="submit">Iniciar Sesión</button>

        </form>

        <br>

        <a href="/recuperar_contrasena">¿Olvidaste tu contraseña?</a>

        <br><br>

        <p>¿No tienes cuenta?</p>
        <a href="/registro">Registrarse</a>

    </center>

</body>

</html>
