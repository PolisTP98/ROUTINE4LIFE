<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agendar Cita - Routine4Life</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="nueva-cita">
    <div class="container">
        <h1>Agendar Nueva Cita</h1>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash flash-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            {% if current_user.id_rol == 1 %}
            <label>Médico:</label>
            <select name="id_medico" required>
                <option value="">Seleccione...</option>
                {% for medico in medicos %}
                <option value="{{ medico.id_medico }}">{{ medico.datos_personales.nombre_completo if medico.datos_personales else medico.email }}</option>
                {% endfor %}
            </select>
            {% else %}
            <input type="hidden" name="id_medico" value="{{ medicos[0].id_medico if medicos else '' }}">
            {% endif %}

            <label>Paciente:</label>
            <select name="id_paciente" required>
                <option value="">Seleccione...</option>
                {% for paciente in pacientes %}
                <option value="{{ paciente.id_paciente }}">{{ paciente.nombre_completo }}</option>
                {% endfor %}
            </select>

            <label>Fecha:</label>
            <input type="date" name="fecha" required>

            <label>Hora:</label>
            <input type="time" name="hora" required>

            <label>Motivo:</label>
            <textarea name="motivo" rows="3" placeholder="Motivo de la consulta..."></textarea>

            <label>Notas adicionales:</label>
            <textarea name="notas" rows="3" placeholder="Notas..."></textarea>

            <div>
                <button type="submit" class="btn btn-guardar">Agendar Cita</button>
                <a href="{{ url_for('dashboard') }}" class="btn btn-cancelar">Cancelar</a>
            </div>
        </form>
    </div>
</body>
</html>
