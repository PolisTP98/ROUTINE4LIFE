<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Diagnóstico y Tratamiento</title>
    <link rel="stylesheet" href="/static/tratamiento_paciente.css">
</head>
<body>

    <header>
        <h2>ROUTINE4LIFE</h2>
        <nav>
            <a href="#">Inicio</a> |
            <a href="#">Médicos</a> |
            <a href="#">Pacientes</a>
        </nav>
    </header>

    <hr>

    <h1>DIAGNÓSTICO Y TRATAMIENTO</h1>

    <form>

        <h3>Información del Paciente</h3>

        <label for="nombre">Nombre del paciente:</label><br>
        <input type="text" id="nombre" name="nombre"><br><br>

        <h3>DIAGNÓSTICO</h3>

        <label for="diagnosticoActual">Diagnóstico actual:</label><br>
        <input type="text" id="diagnosticoActual" name="diagnosticoActual"><br><br>

        <label for="observaciones">Observaciones clínicas:</label><br>
        <textarea id="observaciones" name="observaciones" rows="3" cols="40"></textarea><br><br>

        <label for="riesgo">Riesgo estimado:</label><br>
        <select id="riesgo" name="riesgo">
            <option value="">Seleccione</option>
            <option value="bajo">Bajo</option>
            <option value="medio">Medio</option>
            <option value="alto">Alto</option>
        </select><br><br>

        <label for="recomendaciones">Recomendaciones médicas:</label><br>
        <textarea id="recomendaciones" name="recomendaciones" rows="3" cols="40"></textarea><br><br>

        <h3>TRATAMIENTO</h3>

        <label for="cambiosMedicacion">Cambios en medicación:</label><br>
        <input type="text" id="cambiosMedicacion" name="cambiosMedicacion"><br><br>

        <label for="planAlimenticio">Plan alimenticio recomendado:</label><br>
        <textarea id="planAlimenticio" name="planAlimenticio" rows="3" cols="40"></textarea><br><br>

        <label for="rutinaEjercicio">Rutina de ejercicio sugerida:</label><br>
        <textarea id="rutinaEjercicio" name="rutinaEjercicio" rows="3" cols="40"></textarea><br><br>

        <label for="analisis">Análisis solicitados:</label><br>
        <select id="analisis" name="analisis">
            <option value="">Seleccione</option>
            <option value="sangre">Análisis de sangre</option>
            <option value="orina">Análisis de orina</option>
            <option value="glucosa">Perfil de glucosa</option>
        </select><br><br>

        <label for="proximaConsulta">Fecha de próxima consulta:</label><br>
        <input type="date" id="proximaConsulta" name="proximaConsulta"><br><br>

        <button type="submit">Aceptar</button>
        <button type="reset">Cancelar</button>
        <button type="button">Siguiente</button>

    </form>

</body>
</html>
