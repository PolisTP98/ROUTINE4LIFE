<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Registro - Sistema Médico</title>
    <link rel="stylesheet" href="/static/registro.css">
</head>

<body>

    <center>

        <h1>Sistema Médico</h1>

        <h2>Registro de Usuario</h2>

        <form>

            <table>

                <tr>
                    <td>Nombre completo:</td>
                    <td><input type="text" placeholder="Ingrese su nombre"></td>
                </tr>

                <tr>
                    <td>Correo electrónico:</td>
                    <td><input type="email" placeholder="Ingrese su correo"></td>
                </tr>

                <tr>
                    <td>Usuario:</td>
                    <td><input type="text" placeholder="Cree un usuario"></td>
                </tr>

                <tr>
                    <td>Contraseña:</td>
                    <td><input type="password" placeholder="Cree una contraseña"></td>
                </tr>

                <tr>
                    <td>Confirmar contraseña:</td>
                    <td><input type="password" placeholder="Repita la contraseña"></td>
                </tr>

                <tr>
                    <td>Rol:</td>
                    <td>
                        <select>
                            <option>Médico</option>
                            <option>Administrador</option>
                        </select>
                    </td>
                </tr>

            </table>

            <br>

            <button type="submit">Registrarse</button>

            <button type="reset">Limpiar</button>

        </form>

        <br>

        <a href="/">Volver al login</a>

    </center>

</body>

</html>
