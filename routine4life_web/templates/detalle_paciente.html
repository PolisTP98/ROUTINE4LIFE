<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>detalle_paciente</title>
<link rel="stylesheet" href="/static/detalle_paciente.css">
</head>

<body>

<div class="detalle_paciente_container">

    <header class="detalle_paciente_topbar">

        <div class="detalle_paciente_logo">
            <img src="logo.png">
        </div>

        <nav class="detalle_paciente_menu">
            <a href="#">Inicio</a>
            <a href="#">Médicos</a>
            <a href="#">Pacientes</a>
        </nav>

        <div class="detalle_paciente_user_icons">
            <div class="detalle_paciente_icon"></div>
            <div class="detalle_paciente_icon">ℹ</div>
            <div class="detalle_paciente_icon">⌄</div>
        </div>

    </header>


    <h1 class="detalle_paciente_titulo">
        DATOS PERSONALES DEL PACIENTE
    </h1>


    <section class="detalle_paciente_formulario">

        <div class="detalle_paciente_perfil">

            <div class="detalle_paciente_avatar"></div>

            <div class="detalle_paciente_nombre">
                <label>Nombre del paciente:</label>
                <input type="text" value="Jorge Luis Guevara Mattar">
            </div>

        </div>


        <div class="detalle_paciente_fila">

            <div class="detalle_paciente_campo">
                <label>Fecha de nacimiento:</label>
                <input type="date" value="2006-08-31">
            </div>

            <div class="detalle_paciente_campo">
                <label>Género:</label>
                <select>
                    <option>Masculino</option>
                    <option>Femenino</option>
                </select>
            </div>

        </div>


        <div class="detalle_paciente_fila">

            <div class="detalle_paciente_campo">
                <label>CURP:</label>
                <input type="text" value="1127384300">
            </div>

            <div class="detalle_paciente_campo">
                <label>Teléfono:</label>
                <input type="text" value="+57 322 4588118">
            </div>

        </div>


        <div class="detalle_paciente_fila">

            <div class="detalle_paciente_campo">
                <label>Correo electrónico:</label>
                <input type="email" value="14jorgeguevara32@gmail.com">
            </div>

            <div class="detalle_paciente_campo">
                <label>Dirección:</label>
                <input type="text" value="Cra 28, 42 - 24">
            </div>

        </div>


        <div class="detalle_paciente_botones">

            <button>Aceptar</button>
            <button>Cancelar</button>
            <button>Siguiente</button>

        </div>

    </section>

</div>

</body>
</html>
