<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Historial de Consultas</title>
    <link rel="stylesheet" href="/static/historial_consulta.css">
</head>

<body>

    <header>

        <table width="100%">
            <tr>

                <td>
                    <img src="#" alt="Logo" width="70">
                </td>

                <td>
                    <a href="#">Inicio</a>
                    <a href="#">Médicos</a>
                    <a href="#">Pacientes</a>
                </td>

                <td align="right">
                    <span>Usuario</span>
                    <span>Información</span>
                </td>

            </tr>
        </table>

    </header>

    <hr>

    <center>

        <h2>HISTORIAL DE CONSULTAS</h2>

        <hr width="80%">

    </center>

    <form>

        <table align="center">

            <tr>

                <td rowspan="2">
                    <img src="#" alt="Foto paciente" width="80">
                </td>

                <td>
                    <label><b>Nombre del paciente:</b></label><br>
                    <input type="text" placeholder="Nombre del paciente">
                </td>

            </tr>

            <tr>
                <td></td>
            </tr>

            <tr>

                <td>
                    <label>Fecha de cada consulta:</label><br>
                    <input type="text">
                </td>

                <td>
                    <label>Motivo de la consulta:</label><br>
                    <input type="text">
                </td>

            </tr>

            <tr>

                <td>
                    <label>Notas médicas:</label><br>
                    <textarea rows="4" cols="30"></textarea>
                </td>

                <td>
                    <label>Cambios en el tratamiento:</label><br>
                    <input type="text">
                </td>

            </tr>

        </table>

        <br><br>

        <center>

            <button type="button">Aceptar</button>
            <button type="button">Cancelar</button>
            <button type="button">Siguiente</button>

        </center>

    </form>

</body>

</html>
